<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mattie's Hardwood Flooring</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Nunito',sans-serif;background:#1C1C1E;color:#fff;min-height:100vh;
  display:flex;flex-direction:column;align-items:center;justify-content:center;padding:40px 20px}
.logo{font-size:4rem;margin-bottom:10px}
h1{font-size:1.8rem;font-weight:800;margin-bottom:6px}
.sub{color:#F59E0B;font-size:1rem;font-weight:600;margin-bottom:40px}
.links{display:flex;flex-direction:column;gap:16px;width:100%;max-width:360px}
a{display:flex;align-items:center;gap:14px;background:#fff;color:#1C1C1E;
  text-decoration:none;padding:20px 24px;border-radius:14px;font-weight:700;
  font-size:1.1rem;transition:transform .1s,box-shadow .15s;box-shadow:0 2px 8px rgba(0,0,0,.2)}
a:active{transform:scale(.97)}
a .icon{font-size:1.5rem}
a .desc{font-size:.8rem;font-weight:600;color:#6B7280;margin-top:2px}
.footer{margin-top:50px;font-size:.75rem;color:#6B7280;text-align:center}
</style>
</head>
<body>
<div class="logo">🪵</div>
<h1>Mattie's Hardwood Flooring</h1>
<div class="sub">Job Progress Tracker</div>
<div class="links">
  <a href="team-app.html">
    <span class="icon">👷</span>
    <div><div>Team App</div><div class="desc">For field crews — punch list, photos</div></div>
  </a>
  <a href="manager-app.html">
    <span class="icon">📊</span>
    <div><div>Manager Dashboard</div><div class="desc">Monitor all jobs & download photos</div></div>
  </a>
</div>
<div class="footer">mattieshardwoodflooring.com</div>
</body>
</html>
